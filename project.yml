name: LitterPicker
options:
  bundleIdPrefix: com.litterpicker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  LitterPicker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LitterPicker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.litterpicker.app
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseStorage
    info:
      path: LitterPicker/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: "LitterPicker uses your location to track your cleanup route and show nearby community cleanups."
        NSPhotoLibraryUsageDescription: "LitterPicker needs access to your photos to attach images to bulky item reports."
        UIBackgroundModes:
          - location
        CFBundleDisplayName: Litter Picker
    entitlements:
      path: LitterPicker/LitterPicker.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
